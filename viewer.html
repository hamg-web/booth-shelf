<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>booth.shelf viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf9f7;--surface:#fff;--surface2:#f4f2ef;
  --border:#e8e4de;--border2:#d4cfc7;
  --text:#1a1816;--text2:#6b6560;--text3:#9e9892;
  --pink:#f28fa3;--pink-l:#fdeef2;--pink-m:#f9d4db;
  --blue:#3b7dd8;--blue-l:#eef4fd;
  --r:10px;--rl:14px;--rxl:18px;
  --sh:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.04);
  --sh2:0 4px 16px rgba(0,0,0,.1),0 1px 4px rgba(0,0,0,.06);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#141210;--surface:#1e1c19;--surface2:#252220;
  --border:#302d29;--border2:#3d3935;
  --text:#f0ede8;--text2:#9e9892;--text3:#6b6560;
  --pink-l:#2a1820;--blue-l:#141e2e;
}}
body{font-family:'DM Sans','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6}
.hdr{position:sticky;top:0;z-index:50;background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;height:56px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.logo{font-size:17px;font-weight:600;letter-spacing:-.5px}.logo .dot{color:var(--pink)}
.vo{background:var(--blue-l);border-bottom:1px solid #b8d4f5;padding:10px 2rem;font-size:13px;color:var(--blue);display:flex;align-items:center;gap:8px;font-weight:500}
.vo svg{width:16px;height:16px;flex-shrink:0}
.main{max-width:1100px;margin:0 auto;padding:2rem 1.5rem 4rem}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap;text-decoration:none}
.btn:hover{background:var(--surface2)}
.btn.pri{background:var(--pink);border-color:var(--pink);color:#fff}
.btn.pri:hover{background:#e87a91;border-color:#e87a91}
.btn svg{width:15px;height:15px;flex-shrink:0}
.frow{display:flex;align-items:center;gap:8px;margin-bottom:.75rem;flex-wrap:wrap}
.flbl{font-size:12px;color:var(--text3)}
.chip{padding:5px 13px;border-radius:20px;border:1px solid var(--border2);background:var(--surface);font-size:12px;font-weight:500;cursor:pointer;color:var(--text2);font-family:inherit;transition:all .15s}
.chip:hover{border-color:var(--pink);color:var(--pink)}
.chip.on{background:var(--pink);border-color:var(--pink);color:#fff}
.chip.bl:hover{border-color:var(--blue);color:var(--blue)}
.chip.bl.on{background:var(--blue);border-color:var(--blue);color:#fff}
.cnt{font-size:12px;color:var(--text3);margin-left:auto}
.trow{display:flex;align-items:center;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rl)}
.trow.hide{display:none}
.trow-lbl{font-size:12px;color:var(--text3);white-space:nowrap}
.sort-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border:none;background:transparent;font-size:12px;font-weight:500;cursor:pointer;color:var(--text2);font-family:inherit;transition:all .15s;white-space:nowrap}
.sort-btn svg{width:13px;height:13px;flex-shrink:0}
.sort-btn:hover{color:var(--text);background:var(--surface2)}
.sort-btn.on{background:var(--pink-l);color:var(--pink)}
.search-row{margin-bottom:.75rem}
.search-wrap{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);padding:7px 12px;transition:border-color .15s}
.search-wrap:focus-within{border-color:var(--pink)}
.search-wrap>svg{width:15px;height:15px;color:var(--text3);flex-shrink:0}
.search-wrap input{flex:1;border:none;background:transparent;outline:none;font-size:13px;font-family:inherit;color:var(--text)}
.search-wrap input::placeholder{color:var(--text3)}
.search-wrap #searchClear{border:none;background:none;cursor:pointer;color:var(--text3);display:flex;padding:0}
.search-wrap #searchClear svg{width:15px;height:15px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-top:1.25rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rxl);overflow:hidden;transition:box-shadow .2s,transform .2s;box-shadow:var(--sh)}
.card:hover{box-shadow:var(--sh2);transform:translateY(-2px)}
.thumb-wrap{width:100%;aspect-ratio:1;overflow:hidden;background:var(--surface2);cursor:pointer;position:relative}
.thumb{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
.thumb-wrap:hover .thumb{transform:scale(1.04)}
.thumb-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--text3)}
.thumb-ph svg{width:32px;height:32px;opacity:.4}
.cbody{padding:10px 12px 12px}
.ctitle{font-size:12px;font-weight:600;color:var(--text);line-height:1.4;margin-bottom:7px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ctags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.tag{padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600}
.tag.cat{background:var(--pink-l);color:var(--pink)}
.tag.chr{background:var(--blue-l);color:var(--blue)}
.cdate{font-size:10px;color:var(--text3);margin-bottom:8px}
.cacts{display:flex;gap:5px}
.ibtn{width:28px;height:28px;border-radius:8px;border:1px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all .15s}
.ibtn svg{width:14px;height:14px}
.ibtn:hover{background:var(--surface2);border-color:var(--border2);color:var(--text)}
.empty{grid-column:1/-1;text-align:center;padding:5rem 2rem;color:var(--text3)}
.empty svg{width:48px;height:48px;margin:0 auto 16px;display:block;opacity:.3}
.empty h3{font-size:15px;font-weight:600;margin-bottom:6px;color:var(--text2)}
.err{text-align:center;padding:5rem 2rem;color:var(--text3)}
.err h3{font-size:15px;font-weight:600;margin-bottom:8px;color:var(--text2)}
.err p{font-size:13px;margin-bottom:16px}
@media(max-width:640px){
  .hdr{padding:0 1rem}
  .main{padding:1.25rem 1rem 3rem}
  .grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
}
</style>
</head>
<body>

<header class="hdr">
  <span class="logo">booth<span class="dot">.</span>shelf</span>
</header>

<div class="vo">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
  공유된 컬렉션입니다 — 보기 전용
</div>

<main class="main" id="app">
  <div class="err">
    <h3>링크가 올바르지 않아요</h3>
    <p>공유 링크가 만료되었거나 올바르지 않습니다.</p>
  </div>
</main>

<script>
var items=[], allTags=[], curCat='all', curTagF='', curSort='added';

function init(){
  // URL 파라미터 방식도 혹시 몰라 남겨둠
  var p=new URLSearchParams(location.search), d=p.get('data');
  if(d){
    try{
      var decoded=decodeURIComponent(escape(atob(d)));
      var parsed=JSON.parse(decoded);
      items=(parsed.items||[]).map(function(i){
        if(i.url && !i.url.startsWith('http')) i.url='https://'+i.url;
        return i;
      });
      allTags=parsed.tags||[];
      buildUI(); render();
    }catch(e){ loadFromJson(); }
  } else {
    loadFromJson();
  }
}

function loadFromJson(){
  var base=location.href.replace(/\/viewer\.html.*$/,'/').replace(/\/$/,'');
  fetch(base+'/data.json?t='+Date.now())
    .then(function(r){
      if(!r.ok) throw new Error('data.json not found');
      return r.json();
    })
    .then(function(parsed){
      items=(parsed.items||[]).map(function(i){
        if(i.url && !i.url.startsWith('http')) i.url='https://'+i.url;
        return i;
      });
      allTags=parsed.tags||[];
      buildUI(); render();
    })
    .catch(function(){
      document.getElementById('app').innerHTML=`<div class="err"><h3>데이터를 불러올 수 없어요</h3><p>GitHub에 <b>data.json</b> 파일이 업로드되어 있는지 확인해주세요.</p><p style="margin-top:8px;font-size:12px;color:var(--text3)">레포지토리 루트에 data.json을 추가하세요.</p></div>`;
    });
}

function buildUI(){
  var app=document.getElementById('app');
  app.innerHTML=`
    <div class="frow">
      <span class="flbl">카테고리</span>
      <button class="chip on" onclick="setFilter('all',this)">전체</button>
      <button class="chip" onclick="setFilter('아바타',this)">아바타</button>
      <button class="chip" onclick="setFilter('헤어',this)">헤어</button>
      <button class="chip" onclick="setFilter('의상',this)">의상</button>
      <button class="chip" onclick="setFilter('악세사리',this)">악세사리</button>
      <button class="chip" onclick="setFilter('텍스쳐',this)">텍스쳐</button>
      <button class="chip" onclick="setFilter('기타',this)">기타</button>
      <span class="cnt" id="cnt">0개</span>
      <div style="display:flex;gap:4px;border:1px solid var(--border2);border-radius:var(--r);overflow:hidden;flex-shrink:0;margin-left:auto">
        <button class="sort-btn on" id="sAdded" onclick="setSort('added')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>추가순
        </button>
        <button class="sort-btn" id="sRelease" onclick="setSort('release')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>출시순
        </button>
      </div>
    </div>
    <div class="trow hide" id="tagRow"><span class="trow-lbl">캐릭터</span><div id="tagChips"></div></div>
    <div class="search-row">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="에셋 이름 또는 샵 이름 검색..." oninput="render()">
        <button id="searchClear" onclick="clearSearch()" style="display:none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
    </div>
    <div class="grid" id="grid"></div>`;
}

function render(){
  var fil=curCat==='all'?items:items.filter(function(i){return i.category===curCat;});
  if(curTagF) fil=fil.filter(function(i){return (i.charTags||[]).indexOf(curTagF)>-1;});
  var q=(document.getElementById('searchInput')||{value:''}).value.trim().toLowerCase();
  if(q){
    fil=fil.filter(function(i){
      return (i.name||'').toLowerCase().indexOf(q)>-1||(i.shop||'').toLowerCase().indexOf(q)>-1;
    });
  }
  var clr=document.getElementById('searchClear');
  if(clr) clr.style.display=q?'flex':'none';
  fil=fil.slice();
  var CAT=['아바타','헤어','의상','악세사리','텍스쳐','기타'];
  if(curSort==='release'){
    fil.sort(function(a,b){
      if(!a.releaseDate&&!b.releaseDate)return 0;
      if(!a.releaseDate)return 1;
      if(!b.releaseDate)return -1;
      return b.releaseDate.localeCompare(a.releaseDate);
    });
  } else if(curCat==='all'){
    fil.sort(function(a,b){return CAT.indexOf(a.category)-CAT.indexOf(b.category);});
  }
  document.getElementById('cnt').textContent=fil.length+'개';
  renderTagChips();
  var g=document.getElementById('grid');
  if(!fil.length){
    g.innerHTML='<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg><h3>에셋이 없습니다</h3></div>';
    return;
  }
  g.innerHTML=fil.map(function(item){
    var chTags=(item.charTags||[]).slice(0,3).map(function(t){return '<span class="tag chr">'+esc(t)+'</span>';}).join('');
    var thumb=item.img?'<img class="thumb" src="'+esc(item.img)+'" alt="'+esc(item.name)+'" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">':'';
    var phStyle=item.img?'display:none':'';
    var date=item.releaseDate?'<div class="cdate">'+item.releaseDate.replace(/^20(\d{2})-(\d{2})-(\d{2})$/,'$1.$2.$3')+'</div>':'';
    return '<div class="card">'
      +'<div class="thumb-wrap" data-url="'+esc(item.url)+'" onclick="openLink(this.dataset.url)">'+thumb+'<div class="thumb-ph" style="'+phStyle+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div></div>'
      +'<div class="cbody">'
      +'<div class="ctitle" title="'+esc(item.name)+' — '+esc(item.shop)+'">'+esc(item.name)+' — '+esc(item.shop)+'</div>'
      +'<div class="ctags"><span class="tag cat">'+esc(item.category)+'</span>'+chTags+'</div>'
      +date
      +'<div class="cacts"><button class="ibtn" data-url="'+esc(item.url)+'" onclick="openLink(this.dataset.url)" title="BOOTH에서 보기"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></button></div>'
      +'</div></div>';
  }).join('');
}

function renderTagChips(){
  var used=allTags.filter(function(t){return items.some(function(i){return (i.charTags||[]).indexOf(t)>-1;});});
  var row=document.getElementById('tagRow');
  if(!row)return;
  if(!used.length){row.classList.add('hide');curTagF='';return;}
  row.classList.remove('hide');
  document.getElementById('tagChips').innerHTML=used.map(function(t){
    return '<button class="chip bl'+(curTagF===t?' on':'')+'" onclick="setTagF(\''+esc(t)+'\')">'+esc(t)+'</button>';
  }).join('');
}

function setFilter(cat,el){
  curCat=cat;
  document.querySelectorAll('.frow .chip').forEach(function(c){c.classList.remove('on');});
  el.classList.add('on'); render();
}
function setTagF(t){curTagF=curTagF===t?'':t;render();}
function clearSearch(){document.getElementById('searchInput').value='';document.getElementById('searchClear').style.display='none';render();}
function setSort(s){
  curSort=s;
  document.getElementById('sAdded').classList.toggle('on',s==='added');
  document.getElementById('sRelease').classList.toggle('on',s==='release');
  render();
}
function openLink(u){if(u&&u.startsWith('http'))window.open(u,'_blank','noopener');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

init();
</script>
</body>
</html>
